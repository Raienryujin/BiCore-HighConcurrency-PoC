name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build and Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore & Build
        run: |
          dotnet restore BiCoreAPI
          dotnet build BiCoreAPI -c Release --no-restore

      - name: Publish
        run: dotnet publish BiCoreAPI -c Release --no-build -o ./publish_output

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BiCoreAPI-Release-Ubuntu
          path: ./publish_output
